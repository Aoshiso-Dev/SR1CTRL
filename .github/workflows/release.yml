name: Release Zip

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore SR1CTRL.slnx

      - name: Build (Release)
        run: dotnet build SR1CTRL.slnx -c Release --no-restore

      - name: Publish app
        run: dotnet publish SR1CTRL/SR1CTRL.csproj -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish/win-x64

      - name: Create zip archive
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $zipName = "SR1CTRL-$version-win-x64.zip"
          Compress-Archive -Path "publish/win-x64/*" -DestinationPath $zipName -Force
          "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
